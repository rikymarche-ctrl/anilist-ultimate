<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anilist Ultimate</title>
    <link rel="stylesheet" href="src/popup/popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="popup-container">
      <header class="main-header">
        <div class="logo-wrapper">
          <div class="logo-glow"></div>
          <img src="icons/icon128.png" alt="Anilist Ultimate" class="main-logo" />
        </div>
        <h1 class="main-title">Astra</h1>
        <div class="main-version">Version 2.0.0</div>
      </header>

      <main class="main-content">
        <!-- Auth Card -->
        <section class="auth-card" id="auth-card">
          <div class="auth-header">
            <span class="status-indicator" id="status-indicator"></span>
            <span class="status-text" id="auth-status-text">Checking status...</span>
          </div>
          
          <div class="user-info hidden" id="user-info">
            <div class="user-name" id="user-name">ExAstra</div>
            <button class="btn btn-danger" id="logout-btn">
              <i class="fa-solid fa-arrow-right-from-bracket"></i>
              <span>Logout</span>
            </button>
          </div>

          <div class="auth-actions" id="login-container">
            <button class="btn btn-primary" id="login-btn">
              <i class="fa-solid fa-user-astronaut"></i>
              <span>Login with AniList</span>
            </button>
          </div>
        </section>

        <!-- Quick Actions -->
        <nav class="action-grid">
          <a href="https://anilist.co" class="btn btn-secondary" target="_blank">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
          </a>
          <button class="btn btn-secondary" id="settings-btn">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
          </button>
        </nav>
      </main>

      <footer class="main-footer">
        <p class="app-description">Enhance your AniList experience with Astra.</p>
        <div class="community-tag">
          Built with <i class="fa-solid fa-heart"></i> for the community
        </div>
      </footer>
    </div>

    <script type="module" src="src/popup/popup.ts"></script>
  </body>
</html>
