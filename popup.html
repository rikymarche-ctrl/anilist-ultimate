<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anilist Ultimate</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0b1622;
      color: #cfe2f5;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .version {
      font-size: 12px;
      color: #8ba0b2;
    }

    .content {
      text-align: center;
      padding: 20px 0;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #4a9eff 0%, #667eea 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .description {
      font-size: 14px;
      line-height: 1.6;
      color: #b0c4d8;
      margin-bottom: 20px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background: #4a9eff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.2s;
    }

    .button:hover {
      background: #3d8ae5;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #1f2b3d;
      text-align: center;
      font-size: 12px;
      color: #6b7d8f;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Anilist Ultimate</h1>
    <div class="version">v2.0.0</div>
  </div>

  <div class="content">
    <div class="logo">📅</div>
    <p class="description">
      Modern anime calendar and tracking extension for Anilist.
    </p>
    <a href="https://anilist.co" class="button" target="_blank">
      Open Anilist
    </a>
  </div>

  <div class="footer">
    Built with ❤️ for the Anilist community
  </div>
</body>
</html>
